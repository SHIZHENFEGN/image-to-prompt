<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图生提示词 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      width: 320px;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }
    .form-group select:focus, .form-group input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .help-text {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .help-text a { color: #6366f1; text-decoration: none; }
    .save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .save-btn:hover { background: linear-gradient(135deg, #4f46e5, #6366f1); }
    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }
    .status.success { color: #10b981; }
    .status.error { color: #f87171; }
    .about { margin-top: 20px; padding-top: 16px; border-top: 1px solid #333; }
    .about-text { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>图生提示词 - 设置</h1>
  
  <div class="form-group">
    <label>API 服务商</label>
    <select id="provider">
      <option value="zhipu">智谱 AI (推荐)</option>
      <option value="siliconflow">SiliconFlow</option>
      <option value="moonshot">月之暗面</option>
      <option value="deepseek">DeepSeek</option>
      <option value="ollama">Ollama (本地)</option>
    </select>
  </div>
  
  <div class="form-group">
    <label>模型</label>
    <select id="model"></select>
  </div>
  
  <div class="form-group" id="apiKeyGroup">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="请输入 API Key">
    <p class="help-text" id="apiKeyHelp"></p>
  </div>
  
  <button class="save-btn" id="saveBtn">保存设置</button>
  <div class="status" id="status"></div>
  
  <div class="about">
    <p class="about-text">图生提示词 v1.0.0</p>
    <p class="about-text">点击网页图片生成 AI 提示词</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
