<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 图生提示词</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>设置</h1>
    </header>
    
    <main>
      <section class="setting-section">
        <h2>API 配置</h2>
        
        <div class="form-group">
          <label for="provider">API 服务商</label>
          <select id="provider">
            <option value="zhipu">智谱 AI (推荐)</option>
            <option value="moonshot">月之暗面</option>
            <option value="baidu">百度智能云</option>
            <option value="alibaba">阿里云</option>
            <option value="tencent">腾讯云</option>
            <option value="baichuan">百川智能</option>
            <option value="minimax">MiniMax</option>
            <option value="stepfun">阶跃星辰</option>
            <option value="siliconflow">SiliconFlow</option>
            <option value="deepseek">DeepSeek</option>
            <option value="ollama">Ollama (本地模型)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="model">模型选择</label>
          <select id="model">
            <option value="">加载中...</option>
          </select>
        </div>
        
        <div class="form-group" id="apiKeyGroup">
          <label for="apiKey">API Key</label>
          <input type="password" id="apiKey" placeholder="请输入您的 API Key">
          <p class="help-text" id="apiKeyHelp">在对应平台获取 API Key</p>
        </div>
      </section>
      
      <section class="setting-section">
        <h2>关于</h2>
        <p class="about-text">图生提示词 v1.0.0</p>
        <p class="about-text">将网页图片转化为 AI 生图提示词</p>
      </section>
      
      <div class="actions">
        <button id="saveBtn" class="primary-btn">保存设置</button>
        <div id="saveStatus" class="save-status"></div>
      </div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
