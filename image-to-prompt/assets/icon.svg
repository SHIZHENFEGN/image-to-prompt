<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  
  <!-- 魔法光晕 -->
  <ellipse cx="64" cy="64" rx="55" ry="55" fill="#fff" opacity="0.08"/>
  
  <!-- 图片框 -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
  
  <!-- 风景图元素 -->
  <path d="M20 60 L35 45 L50 55 L65 40 L80 60" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <circle cx="70" cy="32" r="6" fill="#fbbf24" opacity="0.9"/>
  
  <!-- 魔法星星 -->
  <polygon points="100,30 103,36 110,36 105,40 107,47 100,43 93,47 95,40 90,36 97,36" fill="#fff"/>
  <polygon points="115,55 117,59 122,59 118,62 119,67 115,64 111,67 112,62 108,59 113,59" fill="#fff" opacity="0.7"/>
  
  <!-- 提示词波纹 -->
  <g opacity="0.8">
    <path d="M88 50 Q100 64 88 78" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M96 44 Q112 64 96 84" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- 底部光效 -->
